<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Library Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div id="alertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 1050; min-width: 300px;"></div>

    <div class="mx-auto auth-container">
      <div class="card p-4">
        <h3 class="text-center mb-4">📝 Register Account</h3>
        <form onsubmit="handleRegister(event)">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="registerName" class="form-control" placeholder="enter name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="registerEmail" class="form-control" placeholder="enter email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="registerPassword" class="form-control" placeholder="at least 6 characters" minlength="6" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select id="registerRole" class="form-select">
              <option value="STUDENT">Student</option>
              <option value="LIBRARIAN">Librarian</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success w-100 mb-3">Register</button>
          <div class="text-center">
            <span>Already have an account? <a href="index.html">Login</a></span>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>

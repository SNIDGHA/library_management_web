<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books Catalog - Library Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">📚 Library Portal</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="books.html">Books</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="history.html">Borrow Log</a>
          </li>
          <li class="nav-item">
            <a class="nav-link d-none" id="librarianNavLink" href="admin.html">Admin Panel</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <span class="text-light me-3" id="userGreeting"></span>
          <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="alertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 1050; min-width: 300px;"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Books Directory</h2>
      <div class="d-none" id="addBookBtnWrapper">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addBookModal">➕ Add Book</button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="row mb-3">
      <div class="col-md-6">
        <form onsubmit="handleSearch(event)" class="d-flex gap-2">
          <input type="text" id="searchInput" class="form-control" placeholder="Search by title, author, or ISBN...">
          <button type="submit" class="btn btn-outline-primary">Search</button>
          <button type="button" class="btn btn-outline-secondary" onclick="clearSearch()">Clear</button>
        </form>
      </div>
    </div>
    
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Author</th>
              <th>ISBN</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="booksTableBody">
            <!-- Dynamic Content -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ADD BOOK MODAL -->
  <div class="modal fade" id="addBookModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add New Book</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="addBookForm" onsubmit="handleAddBook(event)">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Book Title</label>
              <input type="text" id="addBookTitle" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Author</label>
              <input type="text" id="addBookAuthor" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">ISBN</label>
              <input type="text" id="addBookIsbn" class="form-control" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save Book</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- EDIT BOOK MODAL -->
  <div class="modal fade" id="editBookModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Book</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="editBookForm" onsubmit="handleEditBook(event)">
          <div class="modal-body">
            <input type="hidden" id="editBookId">
            <div class="mb-3">
              <label class="form-label">Book Title</label>
              <input type="text" id="editBookTitle" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Author</label>
              <input type="text" id="editBookAuthor" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">ISBN</label>
              <input type="text" id="editBookIsbn" class="form-control" required>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" id="editBookAvailable" class="form-check-input">
              <label class="form-check-label">Available for Borrowing</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-success">Update Book</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/books.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initBooksPage();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Library Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div id="alertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 1050; min-width: 300px;"></div>

    <div class="mx-auto auth-container">
      <div class="card p-4">
        <h3 class="text-center mb-4">📚 Library Login</h3>
        <form onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="enter email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="enter password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
          <div class="text-center">
            <span>Don't have an account? <a href="register.html">Register</a></span>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem("token") && localStorage.getItem("user")) {
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
